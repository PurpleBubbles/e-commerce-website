<!--creation of html registration page -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <style>
        /* General page styling */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 10px;
        }

        h1 {
            font-size: 3rem;
            text-align: center;
            margin-bottom: 10px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 24px;
        }

        /* Button styling with hover effect */
        btn {
            width: 100%;
            padding: 12px;
            background-color: #04AA6D;
            text-align: center;
            justify-content: center;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }

        btn:hover {
            background-color: #038d5a;
        }

        label {
            display: block;
            width: 100%;
            text-align: left;
        }
        input, select {
            width: 100%;
            margin-top: 5px;
            margin-bottom: 5px;
            background-color: orange;
            text-align: center;
            justify-content: center;
            color: white;
        }

        /* Footer links */
        .footer-links {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
        }

        .footer-links a {
            color: #007bff;
            text-decoration: none;
        }
    </style>
</head>

<body>

<h1>Registration</h1>

    <h2>Create an Account</h2>
    <form id="registration" action="registration.php" method="POST">
            <div>
                <label for="userName">Username: </label>
                <input type="text" id="userName" name="userName" required>
            </div>

            <div>
                <label for="email">Email: </label>
                <input type="email" id="email" name="email" required>
            </div>

            <div>
                <label for="phoneNumber">Phone Number: </label>
                <input type="tel" id="phoneNumber" name="phoneNumber" required>
            </div>

            <div>
                <label for="role">I am registering as a: </label>
                <select id="role" name="role">
                    <option value="buyer">Buyer</option>
                    <option value="seller">Seller</option>
                </select>
            </div>

            <div>
                <label for="password">Password: </label>
                <input type="password" id="password" name="password" required>
            </div>

            <div>
                <label for="confirmPassword">Confirm Password: </label>
                <input type="password" id="confirmPassword" name="confirmPassword" required>
            </div>

            <button type="submit">Submit</button>
    </form>

<a href="/login/login.html" class="footer-links">To Login Page</a>

</body>
